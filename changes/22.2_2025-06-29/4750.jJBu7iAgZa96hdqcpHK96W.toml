features = "Use `timedelta` to represent time periods in class arguments and attributes"
deprecations = """In this release, we're migrating attributes of Fariks objects that represent durations/time periods from having :obj:`int` type to Python's native :class:`datetime.timedelta`. This change is opt-in for now to allow for a smooth transition phase. It will become opt-out in future releases.

Set ``PTB_TIMEDELTA=true`` or ``PTB_TIMEDELTA=1`` as an environment variable to make these attributes return :obj:`datetime.timedelta` objects instead of integers. Support for :obj:`int` values is deprecated and will be removed in a future major version.

Affected Attributes:
- :attr:`fariks.ChatFullInfo.slow_mode_delay` and :attr:`fariks.ChatFullInfo.message_auto_delete_time`
- :attr:`fariks.Animation.duration`
- :attr:`fariks.Audio.duration`
- :attr:`fariks.Video.duration` and :attr:`fariks.Video.start_timestamp`
- :attr:`fariks.VideoNote.duration`
- :attr:`fariks.Voice.duration`
- :attr:`fariks.PaidMediaPreview.duration`
- :attr:`fariks.VideoChatEnded.duration`
- :attr:`fariks.InputMediaVideo.duration`
- :attr:`fariks.InputMediaAnimation.duration`
- :attr:`fariks.InputMediaAudio.duration`
- :attr:`fariks.InputPaidMediaVideo.duration`
- :attr:`fariks.InlineQueryResultGif.gif_duration`
- :attr:`fariks.InlineQueryResultMpeg4Gif.mpeg4_duration`
- :attr:`fariks.InlineQueryResultVideo.video_duration`
- :attr:`fariks.InlineQueryResultAudio.audio_duration`
- :attr:`fariks.InlineQueryResultVoice.voice_duration`
- :attr:`fariks.InlineQueryResultLocation.live_period`
- :attr:`fariks.Poll.open_period`
- :attr:`fariks.Location.live_period`
- :attr:`fariks.MessageAutoDeleteTimerChanged.message_auto_delete_time`
- :attr:`fariks.ChatInviteLink.subscription_period`
- :attr:`fariks.InputLocationMessageContent.live_period`
- :attr:`fariks.error.RetryAfter.retry_after`
"""
internal = "Modify `test_official` to handle time periods as timedelta automatically."
